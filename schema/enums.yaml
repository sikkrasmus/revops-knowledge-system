# Machine-readable enum values for ci verify.
# Also documented in frontmatter.md. Adding a value requires a PR to this file plus the doc.
#
# Framework vs instance:
# - The shape of this file (five enum keys, what each enforces) is framework.
# - The values inside each key are defaults from the worked example
#   (B2B SaaS sales-assisted, $10 to $100M ARR). A fork edits them to fit its GTM shape.
# - The `type` list is mixed: universal types (icp, persona, metric-definition,
#   meta, source, function-readme) belong to any fork. Sales-specific types
#   (battlecard, objection, pricing-pattern, postmortem, champion-profile)
#   ship as defaults from the filled sales function. Drop them in a marketing-led
#   or CS-led fork; replace with that function's templates.

type:
  # Universal across forks
  - icp                  # ICP tier or definition
  - persona              # individual persona or role
  - buying-committee     # multi-persona configuration
  - sku                  # single SKU spec
  - packaging            # edition or package definition
  - pricing-policy       # canonical price book or policy
  - discount-guardrail   # discount rules
  - usage-meter          # usage-billed meter spec
  - value-prop           # positioning artifact
  - category-narrative   # category-level narrative
  - elevator-pitch       # short pitch variant
  - competitor           # competitor profile
  - win-loss-pattern     # observed pattern
  - metric-definition    # metric or KPI definition
  - source               # raw source snapshot in sources/
  - meta                 # repo-level meta (PRINCIPLES, schema docs)
  - function-readme      # functions/<x>/README.md
  - playbook             # function-specific playbook
  - methodology          # function-specific methodology
  - framework            # decision framework
  - play                 # repeatable play
  # Defaults from the filled sales function (drop or replace in non-sales-led forks)
  - battlecard
  - objection
  - pricing-pattern
  - postmortem
  - champion-profile

motion:
  - plg
  - sales-assisted
  - enterprise

segment:
  - smb
  - mid-market
  - enterprise

consumers:
  - marketing
  - sales
  - cs
  - support
  - revops
  - finance
  - legal
  - product

confidence:
  - low
  - medium
  - high
